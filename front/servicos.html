<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serviços - GreenCode</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <main>
      <!-- Hero Section -->
      <section class="hero">
        <div class="container">
          <h1>Nossos Serviços</h1>
          <p>Soluções tecnológicas sustentáveis para transformar a educação</p>
        </div>
      </section>

      <section>
        <h2 class="section-title">Cursos</h2>
        <div class="cards-container" id="courses-container">
        </div>
      </section>

      <section>
        <h2 class="section-title">Kits Educacionais Sustentáveis</h2>
        <div class="cards-container" id="kits-container">
        </div>
      </section>

      <section>
        <h2 class="section-title">E-books para Profissionalização</h2>
        <div class="cards-container" id="ebooks-container">
        </div>
      </section>
    </main>

    <div id="productModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modalContent">
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>


    <script src="./assets/js/main.js"></script>
    <script type="module" src="./assets/js/componentLoader.js"></script>
    <script src="./assets/js/services.js"></script>
  </body>
</html>
